<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Axiomic — Coming Soon</title>
<meta name="description" content="Turning construction chaos into control.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231F1E1D'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Georgia, serif' font-style='italic' font-size='20' fill='%23F5F1EB'%3Ea%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:      #FFFFFF;
    --cream:      #F5F1EB;
    --cream-soft: #FAF7F1;
    --ink:        #1F1E1D;
    --ink-2:      #2E2C2A;
    --ink-3:      #6B6762;
    --ink-4:      #A4A09A;
    --border:     #E6E1D8;
    --border-2:   #D2CCC0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.55;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
  .serif    { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
  .serif-it { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-weight: 400; letter-spacing: -0.01em; }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 48px 28px 80px; }

  /* Top nav (minimal) */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 40px;
  }
  .brand {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 22px; letter-spacing: -0.01em; color: var(--ink);
  }
  .brand .dot { color: var(--ink-4); margin: 0 6px; }
  .top-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--ink-4); text-transform: uppercase; }

  /* Blueprint frame */
  .blueprint {
    border: 1px solid var(--border-2);
    background:
      repeating-linear-gradient(0deg,  transparent, transparent 14px, rgba(31,30,29,0.04) 14px, rgba(31,30,29,0.04) 15px),
      repeating-linear-gradient(90deg, transparent, transparent 14px, rgba(31,30,29,0.04) 14px, rgba(31,30,29,0.04) 15px),
      var(--cream-soft);
    border-radius: 14px;
    position: relative;
    padding: 18px 24px 20px;
    overflow: hidden;
  }
  .blueprint-corner {
    position: absolute;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--ink-4); letter-spacing: 0.08em; text-transform: uppercase;
  }
  .bp-tl { top: 12px; left: 16px; }
  .bp-tr { top: 12px; right: 16px; }
  .bp-bl { bottom: 12px; left: 16px; }
  .bp-br { bottom: 12px; right: 16px; }

  .legend { display: inline-flex; gap: 18px; margin-left: 14px; vertical-align: middle; }
  .legend .pip { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-4); }
  .legend .sq { width: 7px; height: 7px; border: 1px solid var(--ink-4); display: inline-block; }
  .legend .sq.fill { background: var(--ink-4); }

  .skyline-wrap { width: 100%; overflow-x: auto; padding: 8px 0 4px; }
  .skyline-svg { display: block; margin: 0 auto; }

  /* Hero copy */
  .hero { text-align: center; margin: 44px auto 0; max-width: 820px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-3);
  }
  .eyebrow .dotx { display: inline-block; width: 3px; height: 3px; border-radius: 99px; background: var(--ink-4); margin: 0 10px 3px; vertical-align: middle; }
  h1.headline {
    font-family: 'Instrument Serif', Georgia, serif;
    font-weight: 400;
    font-size: clamp(56px, 9vw, 108px);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin: 20px 0 8px;
    color: var(--ink);
  }
  h1.headline .it { font-style: italic; }
  .subline {
    font-size: 17px; color: var(--ink-3); max-width: 560px; margin: 26px auto 0;
    line-height: 1.65;
  }
  .subline .n { color: var(--ink); font-weight: 600; }

  /* Email capture */
  .capture {
    margin: 46px auto 0; max-width: 560px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 14px 14px 18px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
  }
  .capture input {
    flex: 1; border: 0; outline: 0; background: transparent;
    font: 500 15px/1.4 'Inter', sans-serif; color: var(--ink);
    padding: 8px 0;
  }
  .capture input::placeholder { color: var(--ink-4); }
  .capture button {
    border: 0; background: var(--ink); color: var(--cream);
    font: 600 13px 'Inter', sans-serif; letter-spacing: 0.02em;
    padding: 10px 16px; border-radius: 10px; cursor: pointer;
    transition: background 120ms ease;
  }
  .capture button:hover { background: #000; }
  .capture-foot {
    margin: 10px auto 0; max-width: 560px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-4); letter-spacing: 0.12em; text-transform: uppercase;
    text-align: left; padding-left: 4px;
  }
  .capture-foot .ok { color: var(--ink-3); }

  /* Footer */
  footer {
    margin-top: 120px; padding-top: 24px;
    border-top: 1px dashed var(--border-2);
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-4);
  }
  footer a { color: var(--ink-3); text-decoration: none; border-bottom: 1px solid var(--border); }
  footer a:hover { color: var(--ink); }

  @media (max-width: 720px) {
    .wrap { padding: 28px 18px 56px; }
    .blueprint { padding: 22px 18px 28px; }
    .blueprint-corner { font-size: 8px; }
    .capture { padding: 10px 10px 10px 14px; }
    .top-meta { display: none; }
  }
</style>
</head>
<body>
  <div class="wrap">

    <!-- Top bar -->
    <div class="topbar">
      <div class="brand">axiomic<span class="dot">·</span><span class="serif-it">us</span></div>
      <div class="top-meta">v0.1 · coming soon</div>
    </div>

    <!-- Blueprint / portfolio graph -->
    <div class="blueprint" id="bp">
      <div class="skyline-wrap">
        <svg class="skyline-svg" id="skyline" width="1080" height="300" viewBox="0 0 1080 300" aria-hidden="true"></svg>
      </div>
    </div>

    <!-- Hero -->
    <section class="hero">
      <div class="eyebrow">Axiomic<span class="dotx"></span>Built for subcontractors</div>
      <h1 class="headline">Coming <span class="it">soon.</span></h1>
      <p class="subline">Turning construction chaos into <span class="n">control</span>.</p>

      <form class="capture" onsubmit="event.preventDefault(); notifyMe(this);">
        <input type="email" required placeholder="name@company.com" autocomplete="email" aria-label="Email">
        <button type="submit">Notify me ›</button>
      </form>
      <div class="capture-foot"><span class="ok">◉</span> &nbsp;No spam. One email when we open the doors.</div>
    </section>

    <footer>
      <div>© 2026 Axiomic</div>
      <div><a href="mailto:hello@axiomic.us">hello@axiomic.us</a></div>
    </footer>
  </div>

<script>
  // ─────── Portfolio graph renderer ────────────────────────────
  // Generic nodes + edges network. No labels, no real data.
  // Top row: GC anchors (black squares).
  // Middle: project nodes (white circles).
  // Bottom: vendors (triangles) + people (diamonds) + findings (clay circles).
  (function drawGraph(){
    const svg = document.getElementById('skyline');
    const W = 1080, H = 300;
    const INK = '#1F1E1D', INK3 = '#6B6762', INK4 = '#A4A09A';
    const CLAY = '#B5553C';
    const NS = 'http://www.w3.org/2000/svg';
    function el(tag, attrs){
      const n = document.createElementNS(NS, tag);
      for (const k in attrs) n.setAttribute(k, attrs[k]);
      return n;
    }

    // ── Node positions ──
    const gcs = [
      { x: 180, y: 46 },
      { x: 420, y: 46 },
      { x: 660, y: 46 },
      { x: 900, y: 46 },
    ];
    const projects = [
      { x: 120, y: 150 },
      { x: 220, y: 130 },
      { x: 310, y: 160 },
      { x: 400, y: 140 },
      { x: 490, y: 170 },
      { x: 560, y: 130 },
      { x: 640, y: 155 },
      { x: 720, y: 135 },
      { x: 800, y: 160 },
      { x: 880, y: 140 },
      { x: 960, y: 170 },
      { x: 1020,y: 145 },
    ];
    const tris = [
      { x: 140, y: 248 },
      { x: 320, y: 256 },
      { x: 500, y: 250 },
      { x: 700, y: 258 },
      { x: 880, y: 252 },
    ];
    const diamonds = [
      { x: 240, y: 252 },
      { x: 420, y: 248 },
      { x: 600, y: 254 },
      { x: 780, y: 250 },
      { x: 960, y: 256 },
    ];
    const findings = [
      { x: 360, y: 220 },
      { x: 540, y: 210 },
      { x: 760, y: 220 },
    ];

    // ── Edges (deterministic pseudo-random mesh) ──
    // Solid black: GC → project
    const gcProj = [
      [0,0],[0,1],[0,2],[0,3],
      [1,3],[1,4],[1,5],
      [2,5],[2,6],[2,7],[2,8],
      [3,8],[3,9],[3,10],[3,11],
    ];
    gcProj.forEach(([g,p]) => {
      svg.appendChild(el('line', {
        x1: gcs[g].x, y1: gcs[g].y + 16,
        x2: projects[p].x, y2: projects[p].y - 10,
        stroke: INK, 'stroke-width': 0.9, opacity: 0.75
      }));
    });

    // Dashed gray: project → vendor/person (shared resources)
    const pv = [
      [0,'t',0],[1,'t',0],[2,'d',0],[3,'t',1],[4,'d',1],[5,'t',2],
      [6,'d',2],[7,'t',3],[8,'d',3],[9,'t',4],[10,'d',4],[11,'t',4],
      [2,'d',1],[4,'t',1],[6,'t',2],[8,'d',2],[10,'d',3],
    ];
    pv.forEach(([pi, kind, k]) => {
      const n = kind === 't' ? tris[k] : diamonds[k];
      svg.appendChild(el('line', {
        x1: projects[pi].x, y1: projects[pi].y + 10,
        x2: n.x, y2: n.y - 10,
        stroke: INK3, 'stroke-width': 0.55, 'stroke-dasharray': '2 3', opacity: 0.55
      }));
    });

    // Clay dashed: finding → project(s) it touches
    const fp = [
      [0, [2,3,4]],
      [1, [4,5,6]],
      [2, [7,8,9]],
    ];
    fp.forEach(([fi, list]) => {
      list.forEach(pi => {
        svg.appendChild(el('line', {
          x1: findings[fi].x, y1: findings[fi].y,
          x2: projects[pi].x, y2: projects[pi].y + 8,
          stroke: CLAY, 'stroke-width': 0.7, 'stroke-dasharray': '3 3', opacity: 0.55
        }));
      });
    });

    // ── Nodes ──
    // GC squares
    gcs.forEach(n => {
      svg.appendChild(el('rect', {
        x: n.x - 22, y: n.y - 16, width: 44, height: 32, rx: 2,
        fill: INK, stroke: INK, 'stroke-width': 1
      }));
    });

    // Project circles (white w/ black ring)
    projects.forEach(n => {
      svg.appendChild(el('circle', {
        cx: n.x, cy: n.y, r: 11,
        fill: '#FAF7F1', stroke: INK, 'stroke-width': 1.1
      }));
      svg.appendChild(el('circle', {
        cx: n.x, cy: n.y, r: 2, fill: INK3
      }));
    });

    // Triangles
    tris.forEach(n => {
      const s = 12;
      svg.appendChild(el('polygon', {
        points: `${n.x},${n.y-s} ${n.x-s},${n.y+s*0.85} ${n.x+s},${n.y+s*0.85}`,
        fill: '#FAF7F1', stroke: CLAY, 'stroke-width': 1
      }));
    });

    // Diamonds
    diamonds.forEach(n => {
      const s = 11;
      svg.appendChild(el('polygon', {
        points: `${n.x},${n.y-s} ${n.x+s},${n.y} ${n.x},${n.y+s} ${n.x-s},${n.y}`,
        fill: '#FAF7F1', stroke: INK, 'stroke-width': 1
      }));
    });

    // Finding circles (clay)
    findings.forEach(n => {
      svg.appendChild(el('circle', {
        cx: n.x, cy: n.y, r: 8,
        fill: '#FAF7F1', stroke: CLAY, 'stroke-width': 1.1
      }));
      svg.appendChild(el('circle', {
        cx: n.x, cy: n.y, r: 2.2, fill: CLAY
      }));
    });

    // Faint cross/reticle flourishes at edges (anonymous map markers)
    const marks = [[60,60],[1020,60],[60,260],[1020,260]];
    marks.forEach(([mx,my]) => {
      svg.appendChild(el('line', { x1: mx-6, y1: my, x2: mx+6, y2: my, stroke: INK4, 'stroke-width': 0.6 }));
      svg.appendChild(el('line', { x1: mx, y1: my-6, x2: mx, y2: my+6, stroke: INK4, 'stroke-width': 0.6 }));
    });
  })();

  // ─────── Notify-me handler (placeholder until a form service is wired in)
  function notifyMe(form){
    const email = form.querySelector('input').value.trim();
    if (!email) return;
    // For now: open mailto so no backend is needed.
    const subject = encodeURIComponent('Notify me — Axiomic');
    const body    = encodeURIComponent('Please add me to the Axiomic announce list.\n\n' + email);
    window.location.href = 'mailto:hello@axiomic.us?subject=' + subject + '&body=' + body;
    // Soft-confirm in the UI
    const btn = form.querySelector('button');
    btn.textContent = 'Thanks ✓';
    btn.disabled = true;
  }
</script>
</body>
</html>
